<!DOCTYPE html>
<html class="staticrypt-html">
  <head>
    <meta charset="utf-8" />
    <title>/*[|template_title|]*/0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="pragma" content="no-cache" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg: #ffffff;
        --fg: #0a0a0a;
        --muted: #737373;
        --border: #e5e5e5;
        --accent: #155DFC;
        --font: 'Figtree', system-ui, sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --fg: #fafafa;
          --muted: #a3a3a3;
          --border: #262626;
        }
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      .staticrypt-html,
      .staticrypt-body {
        height: 100%;
      }

      .staticrypt-body {
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ─── Header ──────────────────────────────────────────────────── */
      .staticrypt-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding: 1.75rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .staticrypt-logo {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        text-decoration: none;
      }

      .staticrypt-logo-back {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: color 0.2s;
      }

      .staticrypt-logo-back:hover { color: var(--accent); }

      /* ─── Page layout ─────────────────────────────────────────────── */
      .staticrypt-content {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 6rem 2rem 4rem;
      }

      .staticrypt-page {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: 2.5rem;
      }

      /* ─── Eyebrow + title ─────────────────────────────────────────── */
      .staticrypt-eyebrow {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 0.75rem;
      }

      .staticrypt-title {
        font-size: clamp(1.75rem, 5vw, 2.5rem);
        font-weight: 300;
        line-height: 1.1;
        letter-spacing: -0.02em;
        color: var(--fg);
      }

      .staticrypt-instructions {
        font-size: 14px;
        color: var(--muted);
        line-height: 1.6;
        font-weight: 300;
        margin-top: 1rem;
      }

      /* ─── Contact note ────────────────────────────────────────────── */
      .staticrypt-contact {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.6;
        font-weight: 300;
      }

      .staticrypt-contact a {
        color: var(--accent);
        text-decoration: none;
      }

      .staticrypt-contact a:hover {
        text-decoration: underline;
      }

      /* ─── Form ─────────────────────────────────────────────────────── */
      .staticrypt-form {
        display: flex;
        flex-direction: column;
        gap: 0;
        border-top: 1px solid var(--border);
        padding-top: 2rem;
      }

      .staticrypt-field-label {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.5rem;
      }

      .staticrypt-password-container {
        position: relative;
        width: 100%;
        border: 1px solid var(--border);
        margin-bottom: 1rem;
        background: transparent;
      }

      .staticrypt-password-container:focus-within {
        border-color: var(--accent);
      }

      #staticrypt-password {
        width: 100%;
        padding: 0.875rem 2.75rem 0.875rem 1rem;
        font-family: var(--font-mono);
        font-size: 13px;
        letter-spacing: 0.1em;
        background: transparent;
        border: none;
        outline: none;
        color: var(--fg);
      }

      .staticrypt-toggle-password-visibility {
        cursor: pointer;
        position: absolute;
        right: 0.75rem;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        opacity: 0.4;
        transition: opacity 0.2s;
        background: none;
        border: none;
        padding: 0;
        display: flex;
        align-items: center;
      }

      .staticrypt-toggle-password-visibility:hover { opacity: 0.8; }

      .staticrypt-decrypt-button {
        font-family: var(--font);
        font-size: 14px;
        letter-spacing: 0;
        text-transform: none;
        background: var(--accent);
        color: #ffffff;
        border: none;
        padding: 1rem 2rem;
        cursor: pointer;
        transition: filter 0.15s;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .staticrypt-decrypt-button:hover { filter: brightness(88%); }

      /* ─── Remember ────────────────────────────────────────────────── */
      label.staticrypt-remember {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 12px;
        color: var(--muted);
        font-family: var(--font-mono);
        letter-spacing: 0.1em;
        margin-bottom: 2rem;
        cursor: pointer;
      }

      .staticrypt-remember input[type="checkbox"] {
        accent-color: var(--accent);
        width: 14px;
        height: 14px;
      }

      /* ─── Loading ─────────────────────────────────────────────────── */
      .staticrypt-spinner-container {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .staticrypt-spinner {
        width: 1.5rem;
        height: 1.5rem;
        border: 2px solid var(--border);
        border-right-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }

      @keyframes spin { 100% { transform: rotate(360deg); } }

      .hidden { display: none !important; }

      /* ─── Dot grid ───────────────────────────────────────────────── */
      #dot-grid {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      /* ─── Custom cursor ───────────────────────────────────────────── */
      @media (pointer: fine) {
        * { cursor: none !important; }

        #custom-cursor {
          position: fixed;
          top: 0;
          left: 0;
          pointer-events: none;
          z-index: 9999;
          will-change: transform;
        }

        #custom-cursor-dot {
          width: 12px;
          height: 12px;
          border-radius: 50%;
          background: #FF5722;
          transition: transform 0.2s ease-out;
        }
      }
    </style>
  </head>

  <body class="staticrypt-body">
    <canvas id="dot-grid" aria-hidden="true"></canvas>
    <div id="custom-cursor"><div id="custom-cursor-dot"></div></div>

    <!-- Loading -->
    <div id="staticrypt_loading" class="staticrypt-spinner-container">
      <div class="staticrypt-spinner"></div>
    </div>

    <!-- Content -->
    <div id="staticrypt_content" class="hidden">

      <!-- Header fixo -->
      <header class="staticrypt-header">
        <a href="../../" class="staticrypt-logo">Mariana Queiroz</a>
        <a href="../../" class="staticrypt-logo-back">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M7 5H3M3 5L5.5 2.5M3 5L5.5 7.5"/>
          </svg>
          Voltar
        </a>
      </header>

      <!-- Formulário central -->
      <div class="staticrypt-content">
        <div class="staticrypt-page">

          <div>
            <p class="staticrypt-eyebrow">Portfólio</p>
            <h1 class="staticrypt-title">/*[|template_title|]*/0</h1>
            <p class="staticrypt-instructions">/*[|template_instructions|]*/0</p>
          </div>

          <p class="staticrypt-contact">
            Caso não tenha a senha de acesso, entre em contato comigo pelo e-mail
            <a href="mailto:mariqcl@gmail.com">mariqcl@gmail.com</a>
            ou pelo <a href="https://www.linkedin.com/in/maariqueiroz/" target="_blank" rel="noopener noreferrer">LinkedIn</a>.
          </p>

          <form id="staticrypt-form" class="staticrypt-form" action="#" method="post">
            <p class="staticrypt-field-label">/*[|template_placeholder|]*/0</p>

            <div class="staticrypt-password-container">
              <input
                id="staticrypt-password"
                type="password"
                name="password"
                placeholder=""
                autofocus
              />
              <img
                class="staticrypt-toggle-password-visibility"
                alt="/*[|template_toggle_show|]*/0"
                title="/*[|template_toggle_show|]*/0"
                src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NDAgNTEyIj48cGF0aCBkPSJNMzguOCA1LjFDMjguNC0zLjEgMTMuMy0xLjIgNS4xIDkuMlMtMS4yIDM0LjcgOS4yIDQyLjlsNTkyIDQ2NGMxMC40IDguMiAyNS41IDYuMyAzMy43LTQuMXM2LjMtMjUuNS00LjEtMzMuN0w1MjUuNiAzODYuN2MzOS42LTQwLjYgNjYuNC04Ni4xIDc5LjktMTE4LjRjMy4zLTcuOSAzLjMtMTYuNyAwLTI0LjZjLTE0LjktMzUuNy00Ni4yLTg3LjctOTMtMTMxLjFDNDY1LjUgNjguOCA0MDAuOCAzMiAzMjAgMzJjLTY4LjIgMC0xMjUgMjYuMy0xNjkuMyA2MC44TDM4LjggNS4xek0yMjMuMSAxNDkuNUMyNDguNiAxMjYuMiAyODIuNyAxMTIgMzIwIDExMmM3OS41IDAgMTQ0IDY0LjUgMTQ0IDE0NGMwIDI0LjktNi4zIDQ4LjMtMTcuNCA2OC43TDQwOCAyOTQuNWM4LjQtMTkuMyAxMC42LTQxLjQgNC44LTYzLjNjLTExLjEtNDEuNS00Ny44LTY5LjQtODguNi03MS4xYy01LjgtLjItOS4yIDYuMS03LjQgMTEuN2MyLjEgNi40IDMuMyAxMy4yIDMuMyAyMC4zYzAgMTAuMi0yLjQgMTkuOC02LjYgMjguM2wtOTAuMy03MC44ek0zNzMgMzg5LjljLTE2LjQgNi41LTM0LjMgMTAuMS01MyAxMC4xYy03OS41IDAtMTQ0LTY0LjUtMTQ0LTE0NGMwLTYuOS41LTEzLjYgMS40LTIwLjJMODMuMSAxNjEuNUM2MC4zIDE5MS4yIDQ0IDIyMC44IDM0LjUgMjQzLjdjLTMuMyA3LjktMy4zIDE2LjcgMCAyNC42YzE0LjkgMzUuNyA0Ni4yIDg3LjcgOTMgMTMxLjFDMTc0LjUgNDQzLjIgMjM5LjIgNDgwIDMyMCA0ODBjNDcuOCAwIDg5LjktMTIuOSAxMjYuMi0zMi41TDM3MyAzODkuOXoiLz48L3N2Zz4="
              />
            </div>

            <label id="staticrypt-remember-label" class="staticrypt-remember hidden">
              <input id="staticrypt-remember" type="checkbox" name="remember" checked />
              Manter conectado
            </label>

            <input
              type="submit"
              class="staticrypt-decrypt-button"
              value="/*[|template_button|]*/0"
            />
          </form>

        </div>
      </div>
    </div>

    <script>
      const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
      const templateError = "/*[|template_error|]*/0",
            templateToggleAltShow = "/*[|template_toggle_show|]*/0",
            templateToggleAltHide = "/*[|template_toggle_hide|]*/0",
            isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
            staticryptConfig = /*[|staticrypt_config|]*/ 0;

      const templateConfig = {
        rememberExpirationKey: "staticrypt_expiration",
        rememberPassphraseKey: "staticrypt_passphrase",
        replaceHtmlCallback: null,
        clearLocalStorageCallback: null,
      };

      const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

      // Dot grid animation
      (function () {
        var canvas = document.getElementById("dot-grid");
        if (!canvas) return;
        var ctx = canvas.getContext("2d");
        var dpr = window.devicePixelRatio || 1;
        var mouse = { x: -9999, y: -9999 };
        var raf;

        function resize() {
          canvas.width = window.innerWidth * dpr;
          canvas.height = window.innerHeight * dpr;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();

        window.addEventListener("mousemove", function (e) {
          mouse.x = e.clientX; mouse.y = e.clientY;
        }, { passive: true });
        window.addEventListener("touchmove", function (e) {
          var t = e.touches[0];
          if (t) { mouse.x = t.clientX; mouse.y = t.clientY; }
        }, { passive: true });
        window.addEventListener("touchend", function () {
          mouse.x = -9999; mouse.y = -9999;
        }, { passive: true });
        window.addEventListener("mouseleave", function () {
          mouse.x = -9999; mouse.y = -9999;
        });
        window.addEventListener("resize", resize);

        var GAP = 36, RADIUS = 90;
        function draw() {
          var W = window.innerWidth, H = window.innerHeight;
          ctx.clearRect(0, 0, W, H);
          for (var y = GAP; y < H; y += GAP) {
            for (var x = GAP; x < W; x += GAP) {
              var d = Math.hypot(x - mouse.x, y - mouse.y);
              var t = Math.max(0, 1 - d / RADIUS);
              var alpha = 0.07 + t * 0.5;
              var r = 1 + t * 1.2;
              ctx.beginPath();
              ctx.arc(x, y, r, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(21,93,252," + alpha + ")";
              ctx.fill();
            }
          }
          raf = requestAnimationFrame(draw);
        }
        draw();
      })();

      // Custom cursor — mesma lógica do portfólio (div externa move, div interna escala)
      (function () {
        if (!window.matchMedia("(pointer: fine)").matches) return;
        const cursor = document.getElementById("custom-cursor");
        const dot    = document.getElementById("custom-cursor-dot");
        if (!cursor || !dot) return;

        window.addEventListener("mousemove", function (e) {
          cursor.style.transform = "translate3d(" + (e.clientX - 6) + "px, " + (e.clientY - 6) + "px, 0)";
        }, { passive: true });

        window.addEventListener("mouseover", function (e) {
          const t = e.target;
          if (t.closest("button") || t.closest("a") || t.closest("label") || t.closest("input")) {
            dot.style.transform = "scale(2.2)";
          } else {
            dot.style.transform = "scale(1)";
          }
        }, { passive: true });
      })();

      window.onload = async function () {
        const { isSuccessful } = await staticrypt.handleDecryptOnLoad();
        if (!isSuccessful) {
          document.getElementById("staticrypt_loading").classList.add("hidden");
          document.getElementById("staticrypt_content").classList.remove("hidden");
          document.getElementById("staticrypt-password").focus();
          if (isRememberEnabled) {
            document.getElementById("staticrypt-remember-label").classList.remove("hidden");
          }
        }
      };

      const toggleIcon = document.querySelector(".staticrypt-toggle-password-visibility");
      const imgSrcEyeClosed = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NDAgNTEyIj48cGF0aCBkPSJNMzguOCA1LjFDMjguNC0zLjEgMTMuMy0xLjIgNS4xIDkuMlMtMS4yIDM0LjcgOS4yIDQyLjlsNTkyIDQ2NGMxMC40IDguMiAyNS41IDYuMyAzMy43LTQuMXM2LjMtMjUuNS00LjEtMzMuN0w1MjUuNiAzODYuN2MzOS42LTQwLjYgNjYuNC04Ni4xIDc5LjktMTE4LjRjMy4zLTcuOSAzLjMtMTYuNyAwLTI0LjZjLTE0LjktMzUuNy00Ni4yLTg3LjctOTMtMTMxLjFDNDY1LjUgNjguOCA0MDAuOCAzMiAzMjAgMzJjLTY4LjIgMC0xMjUgMjYuMy0xNjkuMyA2MC44TDM4LjggNS4xek0yMjMuMSAxNDkuNUMyNDguNiAxMjYuMiAyODIuNyAxMTIgMzIwIDExMmM3OS41IDAgMTQ0IDY0LjUgMTQ0IDE0NGMwIDI0LjktNi4zIDQ4LjMtMTcuNCA2OC43TDQwOCAyOTQuNWM4LjQtMTkuMyAxMC42LTQxLjQgNC44LTYzLjNjLTExLjEtNDEuNS00Ny44LTY5LjQtODguNi03MS4xYy01LjgtLjItOS4yIDYuMS03LjQgMTEuN2MyLjEgNi40IDMuMyAxMy4yIDMuMyAyMC4zYzAgMTAuMi0yLjQgMTkuOC02LjYgMjguM2wtOTAuMy03MC44ek0zNzMgMzg5LjljLTE2LjQgNi41LTM0LjMgMTAuMS01MyAxMC4xYy03OS41IDAtMTQ0LTY0LjUtMTQ0LTE0NGMwLTYuOS41LTEzLjYgMS40LTIwLjJMODMuMSAxNjEuNUM2MC4zIDE5MS4yIDQ0IDIyMC44IDM0LjUgMjQzLjdjLTMuMyA3LjktMy4zIDE2LjcgMCAyNC42YzE0LjkgMzUuNyA0Ni4yIDg3LjcgOTMgMTMxLjFDMTc0LjUgNDQzLjIgMjM5LjIgNDgwIDMyMCA0ODBjNDcuOCAwIDg5LjktMTIuOSAxMjYuMi0zMi41TDM3MyAzODkuOXoiLz48L3N2Zz4=";
      const imgSrcEyeOpened = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1NzYgNTEyIj48cGF0aCBkPSJNMjg4IDMyYy04MC44IDAtMTQ1LjUgMzYuOC0xOTIuNiA4MC42QzQ4LjYgMTU2IDE3LjMgMjA4IDIuNSAyNDMuN2MtMy4zIDcuOS0zLjMgMTYuNyAwIDI0LjZDMTcuMyAzMDQgNDguNiAzNTYgOTUuNCAzOTkuNEMxNDIuNSA0NDMuMiAyMDcuMiA0ODAgMjg4IDQ4MHMxNDUuNS0zNi44IDE5Mi42LTgwLjZjNDYuOC00My41IDc4LjEtOTUuNCA5My0xMzEuMWMzLjMtNy45IDMuMy0xNi43IDAtMjQuNmMtMTQuOS0zNS43LTQ2LjItODcuNy05My0xMzEuMUM0MzMuNSA2OC44IDM2OC44IDMyIDI4OCAzMnpNMTQ0IDI1NmExNDQgMTQ0IDAgMSAxIDI4OCAwIDE0NCAxNDQgMCAxIDEgLTI4OCAwem0xNDQtNjRjMCAzNS4zLTI4LjcgNjQtNjQgNjRjLTcuMSAwLTEzLjktMS4yLTIwLjMtMy4zYy01LjUtMS44LTExLjkgMS42LTExLjcgNy40Yy4zIDYuOSAxLjMgMTMuOCAzLjIgMjAuN2MxMy43IDUxLjIgNjYuNCA4MS42IDExNy42IDY3LjlzODEuNi02Ni40IDY3LjktMTE3LjZjLTExLjEtNDEuNS00Ny44LTY5LjQtODguNi03MS4xYy01LjgtLjItOS4yIDYuMS03LjQgMTEuN2MyLjEgNi40IDMuMyAxMy4yIDMuMyAyMC4zeiIvPjwvc3ZnPg==";

      toggleIcon.addEventListener("click", function () {
        const passwordInput = document.getElementById("staticrypt-password");
        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          toggleIcon.src = imgSrcEyeOpened;
          toggleIcon.alt = templateToggleAltHide;
          toggleIcon.title = templateToggleAltHide;
        } else {
          passwordInput.type = "password";
          toggleIcon.src = imgSrcEyeClosed;
          toggleIcon.alt = templateToggleAltShow;
          toggleIcon.title = templateToggleAltShow;
        }
      });

      document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
        e.preventDefault();
        const password = document.getElementById("staticrypt-password").value,
              isRememberChecked = document.getElementById("staticrypt-remember").checked;
        const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);
        if (!isSuccessful) {
          alert(templateError);
        }
      });
    </script>
  </body>
</html>
